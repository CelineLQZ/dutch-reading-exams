<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Inburgering Lezen</title>

  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Lezen">
  <meta name="theme-color" content="#1E5BA8" id="theme-meta">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Nunito:wght@500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="root"></div>

  <!-- React 18 -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Babel standalone (compiles JSX in-browser) -->
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>

  <!-- App modules v26 — cache refresh -->
  <script src="store.js?v=26"></script>
  <script src="tts.js?v=26"></script>
  <script type="text/babel" src="swipe-deck.jsx?v=26"></script>
  <script type="text/babel" src="card.jsx?v=26"></script>
  <script type="text/babel" src="screens.jsx?v=26"></script>
  <script type="text/babel" src="app.jsx?v=26"></script>

  <!-- Service worker registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').then(reg => reg.update()).catch(() => {});
      });
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!window.__swReloaded) {
          window.__swReloaded = true;
          window.location.reload();
        }
      });
    }
  </script>
</body>
</html>
